name: Build Plugin ZIP

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and check
        run: ./gradlew --no-daemon clean check build

      - name: Package plugin jar into plugins.zip
        run: |
          JAR_FILE="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1)"
          if [ -z "$JAR_FILE" ]; then
            echo "No plugin jar found in build/libs"
            exit 1
          fi

          mkdir -p dist
          cp "$JAR_FILE" dist/
          (
            cd dist
            zip -r ../plugins.zip ./*.jar
          )

      - name: Upload plugins.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: plugins.zip
          if-no-files-found: error
